{{- if hugo.IsProduction }}
<!-- GDPR Cookie Consent Banner -->
<div id="cookie-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:var(--entry); border-top:1px solid var(--border); padding:16px 24px; z-index:9998; box-shadow:0 -2px 8px rgba(0,0,0,0.15);">
  <div style="max-width:800px; margin:0 auto; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px;">
    <p style="margin:0; flex:1; min-width:200px; font-size:14px; color:var(--content);">
      This site uses Google Analytics to collect anonymous usage data to help improve the content. By accepting, you consent to the use of cookies for analytics purposes.
    </p>
    <div style="display:flex; gap:8px; flex-shrink:0;">
      <button id="cookie-decline" style="padding:8px 18px; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--content); cursor:pointer; font-size:14px;">Decline</button>
      <button id="cookie-accept" style="padding:8px 18px; border:none; border-radius:4px; background:var(--primary); color:var(--theme); cursor:pointer; font-size:14px; font-weight:600;">Accept</button>
    </div>
  </div>
</div>
<script>
(function() {
  var consent = localStorage.getItem('cookie-consent');
  if (!consent) {
    document.getElementById('cookie-banner').style.display = 'block';
  }
  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie-consent', 'accepted');
    document.getElementById('cookie-banner').style.display = 'none';
    if (typeof loadGoogleAnalytics === 'function') loadGoogleAnalytics();
  });
  document.getElementById('cookie-decline').addEventListener('click', function() {
    localStorage.setItem('cookie-consent', 'declined');
    document.getElementById('cookie-banner').style.display = 'none';
  });
})();
</script>
{{- end }}

{{- if .Params.lightbox | default true }}
<style>
.lightbox-trigger {
    display: inline-block;
    cursor: zoom-in;
    transition: opacity 0.2s;
    text-decoration: none !important;
    border: none !important;
    border-bottom: none !important;
    box-shadow: none !important;
    outline: none !important;
}

.lightbox-trigger:hover {
    opacity: 0.9;
    text-decoration: none !important;
    border-bottom: none !important;
}

.lightbox-trigger img {
    max-width: 100%;
    height: auto;
    display: block;
    border: none !important;
    margin: 0;
}

.lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
}

.lightbox-overlay.active {
    display: flex;
}

.lightbox-overlay img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
}

.lightbox-close:hover {
    color: #ccc;
}
</style>

<div class="lightbox-overlay" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img src="" alt="" id="lightbox-img">
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');
    const triggers = document.querySelectorAll('.lightbox-trigger');

    triggers.forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            e.preventDefault();
            const imgSrc = this.getAttribute('href');
            const imgAlt = this.querySelector('img')?.getAttribute('alt') || '';
            lightboxImg.src = imgSrc;
            lightboxImg.alt = imgAlt;
            lightbox.classList.add('active');
        });
    });

    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            closeLightbox();
        }
    });
});
</script>
{{- end }}
